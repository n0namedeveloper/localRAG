version: "3.8"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: localrag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant_storage:/qdrant/storage
    restart: unless-stopped
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: localrag-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./grammars:/app/grammars
      - ./data/hf_cache:/root/.cache/huggingface
    env_file:
      - .env
    environment:
      - HF_HOME=/root/.cache/huggingface
      - SENTENCE_TRANSFORMERS_HOME=/root/.cache/huggingface
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      - qdrant
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-exclude "data/*"

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: localrag-ui
    ports:
      - "3000:80"
    env_file:
      - .env
    environment:
      - BACKEND_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped
